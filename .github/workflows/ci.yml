name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        node: [24]
        os: [ubuntu-latest, windows-latest, macos-15]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun ci

      - name: Lint and format
        run: bunx biome ci --error-on-warnings

      - name: Build the library
        run: bun run build

      - name: Run unit tests
        run: bun run test

      - name: Type check fixtures
        run: bun run test:fixtures-types

      - name: Deploy docs
        # Only trigger deploy if previous steps pass on main branch.
        # Only fire once per branch push.
        if: matrix.os == 'macos-15' && github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl "$deploy_url"
